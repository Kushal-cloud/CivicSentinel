server {
    listen ${PORT};

    root /usr/share/nginx/html;
    index index.html;

    # Reverse-proxy all /api/* calls to the backend service.
    # BACKEND_URL must be set as an env var on the Railway frontend service,
    # e.g. https://civicsentinel-backend.up.railway.app
    location /api/ {
        proxy_pass ${BACKEND_URL}/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Handle React Router — serve index.html for any non-file route.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
